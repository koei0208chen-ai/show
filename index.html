<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手動上傳循環展示系統</title>
    <!-- 雲端函式庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide 圖示 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; margin: 0; overflow: hidden; }
        .grid-enter { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        /* 隱藏滾動條 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const App = () => {
            const [allImages, setAllImages] = useState([]);
            const [activeStage, setActiveStage] = useState('idle'); // idle, importing, zoom-loop
            const [currentPage, setCurrentPage] = useState(0);
            const [currentIndexInPage, setCurrentIndexInPage] = useState(-1);
            const [isPaused, setIsPaused] = useState(false);
            const [isZooming, setIsZooming] = useState(false);
            const [rect, setRect] = useState(null);

            const timerRef = useRef(null);
            const gridRefs = useRef({});

            const IMAGES_PER_PAGE = 32;
            const STAGE_IMPORT_DELAY = 100;
            const STAGE_ZOOM_STAY = 2000;
            const ANIMATION_DURATION = 800;

            const totalPages = useMemo(() => Math.ceil(allImages.length / IMAGES_PER_PAGE), [allImages]);
            const currentImages = useMemo(() => {
                const start = currentPage * IMAGES_PER_PAGE;
                return allImages.slice(start, start + IMAGES_PER_PAGE);
            }, [allImages, currentPage]);

            // 初始化 Lucide 圖示
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const handleUpload = (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                const newImages = files.map(file => ({
                    id: Math.random().toString(36).substr(2, 9),
                    url: URL.createObjectURL(file),
                    name: file.name
                }));
                setAllImages(prev => [...prev, ...newImages]);
                resetShow();
            };

            const startShow = () => {
                if (allImages.length === 0) return;
                setIsPaused(false);
                setCurrentPage(0);
                setCurrentIndexInPage(0);
                setActiveStage('importing');
            };

            const resetShow = () => {
                setActiveStage('idle');
                setCurrentPage(0);
                setCurrentIndexInPage(-1);
                setIsPaused(false);
                setIsZooming(false);
                setRect(null);
                if (timerRef.current) clearTimeout(timerRef.current);
            };

            const clearAll = () => {
                allImages.forEach(img => URL.revokeObjectURL(img.url));
                setAllImages([]);
                resetShow();
            };

            useEffect(() => {
                if (activeStage === 'idle' || isPaused) return;

                if (activeStage === 'importing') {
                    if (currentIndexInPage < currentImages.length) {
                        timerRef.current = setTimeout(() => {
                            setCurrentIndexInPage(prev => prev + 1);
                        }, STAGE_IMPORT_DELAY);
                    } else {
                        timerRef.current = setTimeout(() => {
                            setActiveStage('zoom-loop');
                            setCurrentIndexInPage(0);
                        }, 600);
                    }
                } else if (activeStage === 'zoom-loop') {
                    const currentEl = gridRefs.current[currentIndexInPage];
                    if (currentEl) {
                        const r = currentEl.getBoundingClientRect();
                        setRect(r);
                        setTimeout(() => setIsZooming(true), 50);

                        timerRef.current = setTimeout(() => {
                            setIsZooming(false);
                            timerRef.current = setTimeout(() => {
                                if (currentIndexInPage < currentImages.length - 1) {
                                    setCurrentIndexInPage(prev => prev + 1);
                                } else {
                                    if (currentPage < totalPages - 1) {
                                        setCurrentPage(prev => prev + 1);
                                        setCurrentIndexInPage(0);
                                        setActiveStage('importing');
                                    } else {
                                        // 自動循環回到第一頁
                                        setCurrentPage(0);
                                        setCurrentIndexInPage(0);
                                        setActiveStage('importing');
                                    }
                                }
                            }, ANIMATION_DURATION);
                        }, STAGE_ZOOM_STAY + ANIMATION_DURATION);
                    }
                }
                return () => { if (timerRef.current) clearTimeout(timerRef.current); };
            }, [activeStage, currentIndexInPage, currentImages, currentPage, totalPages, isPaused]);

            return (
                <div className="min-h-screen bg-slate-950 text-white p-4 md:p-8 font-sans overflow-hidden">
                    <header className="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-white/5 pb-6">
                        <div>
                            <h1 className="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-500 bg-clip-text text-transparent flex items-center gap-2">
                                展示系統 <span className="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/30">ONLINE</span>
                            </h1>
                            <div className="flex items-center gap-4 text-slate-500 text-sm mt-1">
                                <span className="flex items-center gap-1"><i data-lucide="image" className="w-4 h-4"></i> 總張數: {allImages.length}</span>
                                <span className="flex items-center gap-1"><i data-lucide="layers" className="w-4 h-4"></i> 總頁數: {totalPages}</span>
                            </div>
                        </div>

                        <div className="flex items-center gap-3">
                            {activeStage === 'idle' ? (
                                <>
                                    <label className="flex items-center gap-2 px-6 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-xl cursor-pointer transition-all shadow-lg shadow-emerald-900/20">
                                        <i data-lucide="upload" className="w-5 h-5"></i>
                                        <span className="font-medium">選取圖片</span>
                                        <input type="file" multiple accept="image/*" className="hidden" onChange={handleUpload} />
                                    </label>
                                    <button 
                                        onClick={startShow} 
                                        disabled={allImages.length === 0} 
                                        className="flex items-center gap-2 px-6 py-2.5 bg-slate-800 hover:bg-slate-700 disabled:opacity-30 rounded-xl border border-white/5 transition-all"
                                    >
                                        <i data-lucide="play" className="w-5 h-5 fill-current"></i>
                                        <span>開始展示</span>
                                    </button>
                                    <button onClick={clearAll} className="p-2 text-slate-500 hover:text-red-400 transition-colors">
                                        <i data-lucide="trash-2" className="w-6 h-6"></i>
                                    </button>
                                </>
                            ) : (
                                <>
                                    <button onClick={() => setIsPaused(!isPaused)} className="px-6 py-2.5 bg-amber-600 hover:bg-amber-500 rounded-xl flex items-center gap-2 transition-all shadow-lg shadow-amber-900/20">
                                        <i data-lucide={isPaused ? "play" : "pause"} className="w-5 h-5 fill-current"></i>
                                        <span>{isPaused ? '繼續' : '暫停'}</span>
                                    </button>
                                    <button onClick={resetShow} className="px-6 py-2.5 bg-slate-800 hover:bg-red-900/40 border border-slate-700 rounded-xl flex items-center gap-2 transition-all">
                                        <i data-lucide="square" className="w-4 h-4 fill-current"></i>
                                        <span>停止播放</span>
                                    </button>
                                </>
                            )}
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto">
                        <div className="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-4 bg-slate-900/20 p-6 rounded-3xl border border-white/5 relative backdrop-blur-sm">
                            {[...Array(IMAGES_PER_PAGE)].map((_, index) => {
                                const imgData = index < currentIndexInPage || (activeStage === 'zoom-loop' && index < currentImages.length) ? currentImages[index] : null;
                                const isCurrentInLoop = activeStage === 'zoom-loop' && currentIndexInPage === index;
                                return (
                                    <div 
                                        key={index} 
                                        ref={el => gridRefs.current[index] = el} 
                                        className={`relative aspect-square rounded-2xl overflow-hidden transition-all duration-300 ${imgData ? 'bg-slate-800 shadow-lg' : 'bg-slate-950/50 border border-dashed border-slate-800/50'}`}
                                    >
                                        {imgData && (
                                            <img 
                                                src={imgData.url} 
                                                className={`w-full h-full object-cover transition-opacity duration-300 ${isCurrentInLoop ? 'opacity-0' : 'opacity-100 grid-enter'}`} 
                                            />
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        {/* 縮放聚焦展示 */}
                        {activeStage === 'zoom-loop' && currentIndexInPage !== -1 && rect && currentImages[currentIndexInPage] && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center pointer-events-none">
                                <div className={`absolute inset-0 bg-black/90 backdrop-blur-md transition-opacity duration-[800ms] ${isZooming ? 'opacity-100' : 'opacity-0'}`} />
                                <div 
                                    style={{
                                        position: 'fixed',
                                        top: isZooming ? '50%' : rect.top,
                                        left: isZooming ? '50%' : rect.left,
                                        width: isZooming ? 'min(92vw, 1200px)' : rect.width,
                                        height: isZooming ? 'min(85vh, 900px)' : rect.height,
                                        transform: isZooming ? 'translate(-50%, -50%)' : 'translate(0, 0)',
                                        transition: `all ${ANIMATION_DURATION}ms cubic-bezier(0.34, 1.56, 0.64, 1)`,
                                        zIndex: 101,
                                    }}
                                    className="flex flex-col items-center justify-center overflow-hidden rounded-[2.5rem] shadow-2xl bg-black/40 border border-white/10"
                                >
                                    <img src={currentImages[currentIndexInPage].url} className="max-w-full max-h-full object-contain drop-shadow-2xl" />
                                    <div className={`absolute bottom-10 px-8 py-3 bg-white/10 backdrop-blur-xl border border-white/20 rounded-full text-white font-medium flex items-center gap-4 transition-all duration-500 ${isZooming ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                                        <span className="flex items-center gap-2 text-emerald-400">
                                            <i data-lucide="repeat" className="w-4 h-4"></i>
                                            第 {currentPage + 1} / {totalPages} 頁
                                        </span>
                                        <span className="w-px h-4 bg-white/20"></span>
                                        <span className="text-white/80">圖片 {currentIndexInPage + 1} / {currentImages.length}</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {allImages.length === 0 && (
                        <div className="mt-32 text-center animate-pulse">
                            <div className="w-24 h-24 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-6 border border-slate-800">
                                <i data-lucide="upload-cloud" className="w-10 h-10 text-slate-600"></i>
                            </div>
                            <h2 className="text-2xl font-bold text-slate-300 mb-2">手動上傳展示系統</h2>
                            <p className="text-slate-500 max-w-md mx-auto">請先選取圖片，系統將自動進行分頁與循環播放。建議按下 F11 進入全螢幕模式獲得最佳體驗。</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
